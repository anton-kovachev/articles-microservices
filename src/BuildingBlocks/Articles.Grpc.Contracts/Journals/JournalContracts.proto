syntax = "proto3";

option csharp_namespace = "Journals.Grpc";

package journals;

message IsEditorAssignedToJournalRequest
{
    int32 journal_id = 1;
    int32 user_id = 2;
}

message IsEditorAssignedToJournalResponse
{
    bool is_assigned = 1;
}

service JournalService
{
    rpc IsEditorAssignedToJournal(IsEditorAssignedToJournalRequest) return (IsEditorAssignedToJournalResponse)
}
