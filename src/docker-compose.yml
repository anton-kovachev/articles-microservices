services:
  auth.api:
    image: ${DOCKER_REGISTRY-}authapi
    depends_on:
      - sqlserver
      - rabbitmq    
    build:
      context: .
      dockerfile: services/Auth/Auth.API/Dockerfile

  journals-api:
    image: ${DOCKER_REGISTRY-}journals-api
    depends_on:
      - journals-redisdb 
      - rabbitmq    
    build:
      context: .
      dockerfile: services/Journals/Journals.Api/Dockerfile

  articleHub-api:
    image: ${DOCKER_REGISTRY-}articlehub-api
    depends_on:
      - postgres
      - articlehub-hasura
      - rabbitmq    
    build:
      context: .
      dockerfile: services/ArticleHub/ArticleHub.API/Dockerfile
  
  submission-api:
    image: ${DOCKER_REGISTRY-}submission-api
    depends_on:
      - sqlserver
      - rabbitmq
      - mongo-gridfs
    build:
      context: .
      dockerfile: services/Submission/Submission.API/Dockerfile

  review-api:
    image: ${DOCKER_REGISTRY-}review-api
    depends_on:
      - sqlserver
      - rabbitmq
    build:
      context: .
      dockerfile: services/Review/Review.API/Dockerfile

  sqlserver:
    image: mcr.microsoft.com/mssql/server      
  
  journals-redisdb:
    image: redis/redis-stack

  postgres:
    image: postgres

  articlehub-hasura:
    image: hasura/graphql-engine
    depends_on:
      - postgres

  rabbitmq:
    image: rabbitmq:management
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  mongo-gridfs:
    image: mongo:6.0
    volumes:
      - mongo_gridfs_data:/data/db

volumes:
  articlehub_data:
  rabbitmq_data:
  mongo_gridfs_data:
